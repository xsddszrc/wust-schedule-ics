# Gitee Go 自动更新课表 ICS
# 需要先开通 Gitee Go 服务：仓库 → 服务 → Gitee Go → 开通

stages:
  - update

update-schedule:
  stage: update
  image: python:3.12
  timeout: 600
  script:
    - pip install playwright beautifulsoup4 ddddocr
    - playwright install --with-deps chromium
    - python3 generate_ics.py
    - |
      git config user.name "gitee-go[bot]"
      git config user.email "bot@gitee.com"
      git add -f schedule.ics
      if git diff --staged --quiet; then
        echo "No changes"
      else
        git commit -m "Update schedule.ics"
        git push
      fi
