name: Update Schedule ICS

on:
  schedule:
    # 每周一早 8:00 北京时间 = 周一 0:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 也允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 ddddocr
          playwright install --with-deps chromium

      - name: Generate ICS
        env:
          WUST_USERNAME: ${{ secrets.WUST_USERNAME }}
          WUST_PASSWORD: ${{ secrets.WUST_PASSWORD }}
        run: python3 generate_ics.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f schedule.ics
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update schedule.ics [skip ci]"
            git push
          fi
