name: 💡 功能建议
description: 新功能想法、改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 建议描述
      description: 想要什么功能？解决什么问题？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有其他方式能达到同样目的？
