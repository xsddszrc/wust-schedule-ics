name: 🐛 问题反馈
description: 脚本运行出错、课表解析不对、日历显示异常等
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写以下信息，帮助快速定位问题。

  - type: input
    id: python_version
    attributes:
      label: Python 版本
      placeholder: 3.11.5
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Ubuntu 22.04 / Windows 11 / macOS 14
    validations:
      required: true

  - type: dropdown
    id: method
    attributes:
      label: 使用方案
      options:
        - 方案一：服务器部署
        - 方案二：本地电脑
        - 方案三：油猴脚本
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: 问题描述
      description: 发生了什么？期望是什么？
      placeholder: 比如：运行后报错 xxx；课表里某门课没出现；日历里时间是错的
    validations:
      required: true

  - type: textarea
    id: error_log
    attributes:
      label: 错误日志 / 截图
      description: 复制粘贴终端的完整输出，或贴截图
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 任何觉得可能有帮助的上下文
